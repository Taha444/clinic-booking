<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إلغاء الحجز — مركز الهادي</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="confirmation-page">
    <div class="confirmation-card">
      <div class="confirmation-icon" style="background:linear-gradient(135deg,#fef2f2,#fffbeb);">⚠️</div>
      <h2 class="confirmation-title" style="color:var(--danger);">إلغاء الحجز</h2>
      <div style="background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-md);padding:1rem;margin-bottom:1.5rem;text-align:right;">
        <div style="margin-bottom:.5rem;"><strong>👤 الاسم:</strong> {{ booking.name }}</div>
        <div style="margin-bottom:.5rem;"><strong>📅 التاريخ:</strong> {{ booking.date }}</div>
        <div><strong>🕐 الميعاد:</strong> {{ booking.appointment }}</div>
      </div>
      <p class="confirmation-text" style="color:var(--danger);">هل أنت متأكد من إلغاء هذا الحجز؟</p>
      <form method="POST" action="/cancel/{{ booking.cancel_token }}/confirm"
            style="display:flex;flex-direction:column;gap:10px;">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <button type="submit" class="btn-submit" style="background:linear-gradient(135deg,var(--danger),#dc2626);">
          ❌ نعم، إلغاء الحجز
        </button>
        <a href="/" class="btn-back" style="background:linear-gradient(135deg,var(--primary),var(--secondary));">
          🔙 لا، الرجوع
        </a>
      </form>
    </div>
  </div>
</body>
</html>
