<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم الإلغاء — مركز الهادي</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="confirmation-page">
    <div class="confirmation-card">
      <div class="confirmation-icon" style="background:linear-gradient(135deg,#fef2f2,#fffbeb);">❌</div>
      <h2 class="confirmation-title" style="color:var(--danger);">تم إلغاء الحجز</h2>
      <p class="confirmation-text">
        تم إلغاء حجز <strong>{{ booking.name }}</strong> بتاريخ {{ booking.date }} — {{ booking.appointment }} بنجاح.
      </p>
      <a href="/" class="btn-back">🏠 حجز موعد جديد</a>
    </div>
  </div>
</body>
</html>
